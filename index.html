        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");
            }

            if(event.data == "reload"){
                window.document.location.reload();
            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){

                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };

## Intenciones y recepciones del texto
1. Modeliza procesos complejos e interactivos: 
	1. Identifica <mark>componentes funcionales</mark> de una inteligencia distribuida a escala planetaria
	2. Busca explicar el pasado y proyectar consecuencias futuras
	3. Es, a la vez, descriptivo y anticipatorio (pero también normativo)
2. Su recepción lo sitúa en distintos debates en torno a <mark>tecnologías convergentes</mark>:
	1. Neurociencias y aumentación cognitiva (2015)
	2. Digitalización: Gobernanza y alineamiento de la IA (2023-25)
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" template="" -->

## El "Cerebro Global" como narrativa
1. La conexión global de humanos y tecnología
	1. Produce y mantiene sus propios componentes (instituciones, tecnologías, normas, y sistemas de conocimiento)
	2. Autopoiesis: el sistema produce de forma *recursiva* sus propios componentes 
2. Heylighen <mark>se anticipa a rasgos de la IA como sistema</mark>:
	1. Aciertos: ayudan a entender los *loops*, sinergias e interconexiones
	2. Limitaciones: sirven para mostrar los supuestos que sostienen esta lógica
3. Presenta una <mark>narrativa anticipatoria</mark>: no es un *imaginario sociotécnico* (colectivo, institucionalizado, público, performativo), ni es un visionario *insider* (como [Tim Berners-Lee](https://en.wikipedia.org/wiki/Tim_Berners-Lee), [Tim O'Reilly](https://en.wikipedia.org/wiki/Tim_O%27Reilly), o [Kevin Kelly](https://en.wikipedia.org/wiki/Out_of_Control_%28Kelly_book%29))
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## La tesis central

> _"The main idea of this model is that global society can be understood as a superorganism, and that it becomes more like a superorganism as technology and globalization advance."_ (p. 60)

- Actualiza la metáfora organicista clásica (Spencer, Durkheim) con cibernética, sistemas complejos y teoría evolutiva
- La pregunta no es si la sociedad _es_ un superorganismo en sentido estricto, sino <mark>en qué medida es _útil modelarla_ como si lo fuera</mark>
- Estrategia analítica **funcional**, no estructural: los subsistemas identificados no corresponden necesariamente a componentes físicos separados
- Dos subsistemas esenciales: **metabolismo** (procesamiento de materia-energía) y **sistema nervioso** (procesamiento de información)
- El modelo es descriptivo, anticipatorio y produce predicciones sobre tendencias en curso
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#bf9aca" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## La sociedad como sistema autopoiético

> _"Global society can be seen as an autopoietic network of self-producing components, and therefore as a living system or 'superorganism"_ (p. 57)

- **Autopoiesis** (Maturana & Varela, 1980): un sistema que produce recursivamente sus propios componentes y se separa así de su entorno
- El entorno no le dice al sistema cómo organizarse (solo provee materia prima; la organización es interna)
- Solo la **sociedad global** cumple el requisito de cierre organizacional. Ningún subsistema (país, empresa, institución) es autopoiético en sentido estricto
- La sociedad es un **sistema abierto** termodinámicamente (necesita materia y energía del entorno) pero **cerrado organizacionalmente**
- El sistema inmune social distingue perturbaciones externas (invasores, enfermedades, desastres) de renegados internos (criminales, terroristas, virus informáticos)
- Componentes básicos del sistema inmune: policía, justicia, ejército
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#bf9aca" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Red autopoiética 

<img src="Pasted image 20260409112141.png" alt="" style="object-fit: scale-down">


- El sistema S produce recursivamente su propia organización a través de una **red de componentes interconectados**
- La red es mayormente cerrada (ciclos), pero recibe *insumos* (I) del *entorno* (E) y produce *output* (O)
- Existen rutas paralelas y redundantes: un componente puede ser "*salteado* (bypassed)" si otro cumple la misma función de forma más eficiente
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#bf9aca" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Metabolismo: procesamiento de materia-energía

> _"...decomposition is **functional**, but **not** in general **structural**. This means that the functional subsystems... ...do not necessarily correspond to separate physical components: the same function can be performed by several physical or structural components, while the same component can participate in several functions."_ (p. 64)

- Los organismos son **sistemas disipativos** (Nicolis & Prigogine, 1977): exportan entropía para mantener un estado estable dinámico
- La descomposición es **funcional**: la misma función puede ser cumplida por distintos componentes físicos, y un mismo componente puede participar en varias funciones
- La evolución tiende hacia **mayor** **autonomía**: mayor capacidad de producir organización internamente, con menor dependencia del entorno
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#bf9aca" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Subsistemas funcionales del metabolismo

| Función          | Organismo animal            | Sociedad                         |
| ---------------- | --------------------------- | -------------------------------- |
| *Alimentador*    | Comer, beber, inhalar       | Minería, cosecha, bombeo         |
| *Conversor*      | Sistema digestivo, pulmones | Refinerías, plantas procesadoras |
| *Distribuidor*   | Sistema circulatorio        | Redes de transporte              |
| *Productor*      | Células madre               | Fábricas, constructoras          |
| *Expulsor*       | Excreción, exhalación       | Alcantarillas, basura, chimeneas |
| *Almacenamiento* | Grasa, huesos               | Depósitos, silos, contenedores   |
| *Soporte*        | Esqueleto                   | Edificios, puentes               |
| *Movimiento*     | Músculos                    | Motores, máquinas                |
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#bf9aca" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Sistema nervioso: información y control

> _"The 'controller' does not need to be embodied in a separate structural component. <mark>The market can be seen as a distributed control system.</mark>"_

- Los organismos son **sistemas de control** en el sentido cibernético (Ashby, 1964): regulan variables esenciales para minimizar desviaciones respecto al rango óptimo
- Modelo de Powers (1973): el comportamiento es un intento continuo de llevar la situación percibida al estado preferido → bucle de **retroalimentación negativa**
- El mercado opera como sistema de control distribuido: fluctuaciones en oferta → señal de precio → ajuste en producción → corrección de la desviación
- La función de **control no está centralizada**: emerge del agregado de acciones de productores y consumidores
- **Sensores del sistema nervioso social**: mercado, periodistas, científicos, instituciones de sondeo, votantes, sensores automáticos (sismógrafos, termómetros, satélites)
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#bf9aca" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Subsistemas funcionales del sistema nervioso

| Función         | Organismo animal                | Sociedad                                              |
| --------------- | ------------------------------- | ----------------------------------------------------- |
| *Sensor*        | Órganos sensoriales             | Periodistas, investigadores, **sensores automáticos** |
| *Decodificador* | Percepción                      | Expertos, políticos, **opinión pública**              |
| *Canal y red*   | Nervios, neuronas               | **Medios de comunicación**                            |
| *Asociador*     | Aprendizaje sináptico           | **Descubrimiento científico, aprendizaje social**     |
| *Memoria*       | Memoria neuronal                | Bibliotecas, escuelas, **conocimiento colectivo**     |
| *Decisor*       | Funciones cerebrales superiores | Gobierno, **mercado**, votantes                       |
| *Ejecutor*      | Nervios que activan músculos    | Ejecutivos, **sistemas automatizados**                |
Nota: En **negrita** los subsistemas afectados por la IA (negritas propias)
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#bf9aca" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Desarrollo evolutivo: eficiencia, fricción y reestructuración

> _"Thus, <mark>if short-term catastrophes can be avoided</mark>, reduction of friction will further enhance the robustness of societal autopoiesis."_ (p. 76)

- Presión selectiva universal hacia mayor eficiencia. Producir más o mejor output con menos input: **efimerización** (Buckminster Fuller, 1969)
- La eficiencia del metabolismo social es especialmente visible en el **distribuidor**: transporte cada vez más rápido y menos costoso; las distancias importan cada vez menos (menos *fricción*)
- La reducción de fricción tiene una **dualidad**:
    - Mejora los ciclos de retroalimentación negativa (corrección de desviaciones más rápida)
    - Acelera los procesos de retroalimentación positiva (burbujas especulativas, cadenas causales más largas, mayor inestabilidad)
- Efecto sutil: **alargamiento de las cadenas causa-efecto** (un evento en un país afecta producciones, mercados y empleos en otros)
- La mayor inestabilidad genera presión para desarrollar nuevos mecanismos reguladores globales (WTO, FMI, OMS, ONU)
- **Reestructuración organizacional**: reducción de costos de transacción → outsourcing → aplanamiento de jerarquías → heterarquías; menor número de organizaciones por función, mayor número de funciones especializadas
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#bf9aca" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Anticipación: *cerebro global* e *integración* del individuo

> _"This will transform the World-Wide Web into a 'global brain', capable of sensing, interpreting, learning, thinking, deciding, and initiating actions."_ (p.89)

- La **automatización extiende el sistema nervioso social** (archivos, cables, computadoras amplían capacidades de almacenamiento, transmisión y procesamiento de información)
- La red global automatiza: canal y red, memoria, sensor, efector, decodificador
- Pronóstico (I): **aprendizaje** (adaptación automática de conexiones) y **pensamiento** (activación distribuida para resolución de problemas)
- La función **decider** se apoya en <mark>el mercado como traductor de demanda agregada en señal de precio</mark>; la red amplifica y acelera ese mecanismo
- Dos planos de integración individual:
    - **Metabólico**: dependencia material de la infraestructura social (vivienda, energía, agua, salud)
    - **Cognitivo**: dependencia informacional del sistema para la toma de decisiones (actualmente más lenta que la integración metabólica)
- **Pronóstico** (II): convergencia de ambos planos mediante interfaces ubicuas, <mark>dispositivos portátiles y conexión directa cerebro-red</mark>
- La integración reduce la barrera entre procesos cognitivos individuales y procesos del cerebro global
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#4ea699" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Supuestos del modelo

- **S0. Convergencia inevitable:** la tecnología y la globalización avanzan a la par; no hay posibilidad de desacople.
- **S1. La automatización o el mercado como gran regulador descentralizado:** la distribución funcional de tareas equivale a descentralización efectiva (automatizada o regulada por el mercado, como procesador de información), _pero_: 
	- *Hay intervenciones directas*: privatización de internet, uso de datos e IA para extraer renta de la infraestructura (ej: [Controversia precios dinámicos Meli](https://www.infobae.com/economia/2026/03/10/polemica-entre-usuarios-de-mercado-libre-por-precios-distintos-para-un-mismo-producto-las-explicaciones-de-la-empresa/))
	- *Vulnerabilidades*: Auditoria, [de 17.022 agentes, el 3,1% filtra credenciales en ejecución normal](https://arxiv.org/abs/2604.03070) (2025)
- **S2. La reducción de fricción como progreso universal:** la fricción no desaparece, se redistribuye asimétricamente (Bates, 2018; Edwards et al., 2011; Lehuedé, 2024); sistemas de IA en cadenas de suministro (Valdivia, 2025; Crawford & Joler, 2018)
- **S3. La convergencia de estándares como inevitable y deseable:** los estándares tienen una dimensión geopolítica irreductible y son pilares de la competitividad internacional (China, UE, EE.UU.; estándares 5G).
- **S4. La integración del individuo como emancipadora:** la integración metabólica y cognitiva es el sustrato de la economía de la atención y de la disrupción de lo común en lo digital. “*Controversia*: [Tom: agente de IA](https://clawtom.github.io/tom-blog/) bloqueado por editores de Wikipedia por contribuciones no supervisadas (2025)
- **S5. La automatización del sistema nervioso como extensión neutral:** la automatización transforma rutinas de trabajo, redistribuye autoridad epistémica e introduce dependencias con actores corporativos que controlan la infraestructura. *Controversia*: [Amazon vs. Perplexity/Comet](https://www-theguardian-com.translate.goog/technology/2025/nov/18/amazon-vs-perplexity-the-ai-agent-war-has-arrived?_x_tr_sl=en&_x_tr_tl=es&_x_tr_hl=es&_x_tr_pto=tc) litigio por el uso de IA en compras de plataforma. 
- **S6. La eficiencia está pensada por tareas, no de forma agregada**. Paradoja de Jevons.

##  Comportamiento humano y energía: el diagnóstico

> _"A coherent description of the global economy requires a systems view: describing the parts, the processes, how the parts and processes interact, and what these interactions imply about future possibilities."_ (p. 1)

**Comportamiento**
- Abundancia sin precedentes: la biología no cambió, cambiaron la escala y la organización económica
- Sesgos estructurales: gratificación inmediata sobre el futuro
- El "propósito" del humano moderno en la economía ultrasocial: _"contribute to surplus for the market"_

**Energía**
- Las transiciones históricas mayores están ligadas a cambios en el tipo y disponibilidad de energía
- La economía ortodoxa trata la energía como un insumo más, fungible y sustituible: _"somos ciegos (miopes) energéticamente"_ 
- La tecnología dominante no ahorra energía: reemplaza trabajo humano aumentando la demanda total (ej: la _"nube"_ consume más del 15% de la electricidad mundial)

## Dinero, deuda y miopía biofísica

> _"Money is a claim on energy, yet its creation is not tethered to energy availability or cost."_ (p. 7)

- El dinero no es intermediario de riqueza existente: los bancos lo crean al prestarlo (_"loaned into existence"_)
- _"Since money is a claim on energy, then debt is a claim on future energy"_ (p. 7)
- _"Debt is a social construct with physical consequences"_ (p. 7)
- Desde 1965, EE.UU. y el mundo crecen su deuda más rápido que su PBI: transferencia intertemporal de consumo
- La hiperescala de la IA sigue esta lógica: toma de deuda masiva + consumo creciente de recursos como vector de _lock-in_ ("too big to fail")
- Brecha creciente entre representaciones monetarias de la realidad y realidad biofísica: _"We can (for now) readily print money but we can't print energy to give it value"_ (p. 8)

## El superorganismo: ciego, hambriento, al mando

> _"pursuit of economic growth, modern human culture appears as a self-organized, mindless, energy seeking Superorganism, functioning in similar ways to a brainless amoeba using simple tropisms."_ (p. 9)

- El superorganismo emerge de 7.700 millones de humanos siguiendo reglas simples (metabolismo de 17 TW)
- No es humano: _"It's a thing-in-itself (Ding an sich) with its own survival instincts that override the individual humans that comprise it"_ (p. 10)
- _"Unfortunately, the Superorganism cannot plan, only slough forward seeking more energy and growth"_ (p. 12)
- El mercado solo puede _"ver"_ y moverse hacia el Punto Y (crecimiento): no hacia el óptimo biofísico
- Cambio climático y sobrepoblación son _"downstream"_ del imperativo de crecimiento del superorganismo
- *Outsourcing* a la nube (individualidad, cognición)
- La IA sigue este imperativo: genera valor percibido por su promesa de ser _"cerebro global"_, no por riqueza real producida

## Implicaciones: recalibración o contracción

> _"Physics suggests that this is not possible, and that our answers will primarily be found through social changes linked with contraction, not technical innovations resulting in long-term growth."_ (p. 11)

- El desacople absoluto (crecer el PBI mientras se reduce el consumo energético) no tiene respaldo empírico
- El PBI es un buen indicador de cuánta energía quemamos: _"Gross World Burning"_ (p. 10)
- La reducción del PBI en economías avanzadas es probable cuando: (1) el crédito ya no puede sostener el consumo y (2) la energía es más cara y de menor calidad
	- **_"The real challenge will begin when growth ends"_ (p. 13)**
- Las soluciones ambientales no pueden resolverse mientras se mantienen separados los riesgos de crédito, límites al crecimiento y cohesión social
- No cambiar la biología sino la *cultura y el sistema económico*
- _"What sort of new stories do we need?"_ (p. 13)

## Preguntas para la discusión

**1. Sobre la descripción y la normatividad**, Heylighen, en su modelo, asume que la reducción de fricción y la convergencia global son procesos inevitables y deseables. ¿Qué queda fuera de ese marco? ¿Qué actores, qué formas de organización, qué conflictos?

**2. Sobre la escala y la agencia**, Hagens sitúa el problema a escala sistémica y en los mecanismos evolutivos que lo sostienen ¿Cuáles son los lugares para la agencia colectiva e individual? ¿Cómo se pueden pensar las formas sociales en relación con "sistemas" que restringen las decisiones grupales e individuales?

**3. Sobre la IA como componente del superorganismo** Si la IA es el sistema nervioso del superorganismo global, ¿cómo se lo controla? ¿Qué alternativas se presentan como viables frente a él?

**4. Relevancia local** ¿Cómo podemos pensar estas dinámicas en el contexto mexicano y latinoamericano? Por ejemplo, ¿qué se puede hacer para restringir, mediar o revertir los roles subordinados en los que nos inscriben estas infraestructuras?

            const target = {};
            for (let i = 0; i < arguments.length; i++) {
                const source = arguments[i];

                    if (source.hasOwnProperty(key)) {
                        target[key] = source[key];

        function isLight(color) {
            let hex = color.replace('#', '');

            // convert #fff => #ffffff
            if (hex.length == 3) {
                hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
            }

            const c_r = parseInt(hex.substr(0, 2), 16);
            const c_g = parseInt(hex.substr(2, 2), 16);
            const c_b = parseInt(hex.substr(4, 2), 16);
            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }
