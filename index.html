    <script type="text/javascript">
        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");
            }
        }
        window.onpopstate = onPopState;
        window.onmessage = event => {
            if(event.data == "reload"){
                window.document.location.reload();
            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };
    </script>

## S1: La Inteligencia Artificial como (hiper)objeto.

Potts, J. (2025). _Governing hyperobjects—New economics of AI regulation_ (SSRN Scholarly Paper No. 5215889). Social Science Research Network. [https://doi.org/10.2139/ssrn.5215889](https://doi.org/10.2139/ssrn.5215889)

### Situando el texto

- Autor: [Jason Potts](https://en.wikipedia.org/wiki/Jason_Potts_\(economist\)) (_Economista,_ R. Melbourne Inst. of Tech.)  
    _Temas de investigación_: economía de la innovación y de las nuevas tecnologías, economía evolutiva, instituciones y complejidad.
    
- Panelista, simposio en Hong Kong (2025) sobre "https://cils.law.hku.hk/events/the-law-technology-and-economics-of-ai-regulation/"
    
- Publicado en SSRN (plataforma de pre-prints, Elsevier)
    
- Aquí, la aproximación a la IA es a partir de la pregunta por la regulación y el tipo de instituciones-tecnologías que pueden llevarla a cabo.
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-dark-background drop" data-background-color="#9b6fad" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1800px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Argumento central

- La IA no es, en absoluto, un desafío regulatorio _sui generis_ (único en su clase), sino un tipo de objeto que es, en sí mismo, extremadamente difícil de regular.

> "The core difficulty lies in the ontological nature of the object being regulated. AI is not a conventional economic or legal object; it is what Morton (2013) terms a **hyperobject** – an entity of massive spatiotemporal scale, partially beyond human perception, distributed and entangled with other systems in ways that defy conventional comprehension and control." (Potts, 2025, p. 2)

- La respuesta no es la ley, sino **reglas** ya no externas, sino **integradas en la propia tecnología**.
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#f4f4f4" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1800px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Definición de IA

1. 2017: _Transformer architecture_ (maneja el texto de forma no secuencial)
    
2. 2019: Grandes Modelos del Lenguaje (LLM) - GPT (Generative pre-trained transformer)
    
3. 2024-25: Agentes (ejecutar tareas, tomar decisiones, operación autónoma) [organización, rutinas, memoria, aprendizaje]
    



> "AI is not a 'thing' to be controlled through exogenous intervention; it is a non-human being that increasingly operates with autonomy, agency, and persistence across scales" (Potts, 2025, p. 3)
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#4ea699" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1800px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Hiperobjetos (I)

- Objetos que desafían lo que tradicionalmente entendemos como "cosas".
    
- Entidades no-humanas _inmensas_ desde una perspectiva humana_,_ distribuidas en el tiempo (geológico) y el espacio (planetario)
    
- Características:
    
    - Viscosidad (se adhieren a todo)
        
    - No-localidad (física cuántica: objetos no discretos, imposible de localizar en el espacio-tiempo)
        
    - Cíclicos (entran y salen del mundo humano; nunca se los puede ver en su totalidad)
        
    - Interobjetivos (formado a traves de relaciones entrelazadas entre muchas cosas, solo visible en los efectos)
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#faf5f5" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1800px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Hiperobjetos (II)

- Giro ontológico: rompe con las categorías modernas de causalidad, dentro-fuera
    
- Responsables del "próximo momento en la historia y en el pensamiento"
    
- Detectamos su presencia por sus _ciclos_ (entran y salen)
    
- Necesitamos herramientas, modelos, medidas, para verlos (antropoceno, calentamiento global, etc.)
    
- Vivir con ellos es difícil
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-dark-background drop" data-background-color="#aa2324" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1800px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## IA como Hiperobjeto

- La IA es demasiado grande para poder verla o entenderla en su totalidad (incluso para sus creadores)
    
- Su _viscosidad_ hace que toque todos los aspectoas de la vida moderna (_[AI slope](https://www.nytimes.com/video/opinion/100000010700241/when-the-internet-cooks-it-serves-slop.html)_)
    
    - No se la puede separar de los sistemas a los que se adhiere
- Es persistente (huellas irreversibles, no se puede _borrar_)
    
- Es _extraña_ temporalmente: memoria, pasado, futuro a largo plazo, patrones que re-emergen
    
- Interobjetiva: **es un ensamblaje** de código, hardware,energía, instituciones, y comportamiento humano.
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#f7f3f9" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1800px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Gobernanza de IA

1. Económicamente producen _externalidades_ que no parecen no tener límites y que permean toda la actividad económica.
    
2. Nuevas infraestructuras para conocer:
    

> "Engaging with hyperobjects requires new epistemic infrastructures – models to perceive them, platforms to interact with them, and computational rule systems to coordinate around them. They require rules (not values) to organise them" (Potts, 2025, p. 7)

- Las infrastructuras de conocimiento son, hoy, el "target" en dos sentidos
    
    - Nelson y Winter: materialización de objetivos, y patrones/modelos para nuevos sistemas;
        
    - El blanco de ataques políticos (definanciamiento y privatización) y tecnicos (DDoS repositorios abiertos)
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-dark-background drop" data-background-color="#3f4b3b" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1800px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Regulación IA: límites

- **No hay top-down.** La regulación tradicional falla: no se puede observar desde **afuera**, la IA como hiperobjeto no ofrece un afuera para regularlo.
    
- La **gobernanza debe ser interna**: modos y modelos imperfectos, parciales y retroalimentaciones localizadas.
    
- Su **adaptabilidad** (y complejidad) se da a través de representaciones internas (la adaptación es autónoma y directa)
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#f3faf8" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1800px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Regulación IA: propuesta 

- Sistemas distribuidos de infrastructura cambiante (como la IA) requieren conceptualizar un nuevo tipo de agencia.
    
- Propone el concepto de _agentic commons_ (bienes comunes actante): infrastructuras computacionales compartidas governadas no solo por comunidades sino por ellas mismas (a través de reglas, mecanismos de retroalimentación y lógicas adaptativas)
    
- Se necesitan nuevas formas institucionales: estructuras descentralizadas y participativas coproducidas por humanos y máquinas.
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#bf9aca" template="" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1800px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Conclusion 

- Cómo el cambio climático, la IA, es algo que no podemos modificar a voluntad:

> "AI has brought about, in Morton's sense, the end of the world. Machines are no longer, as it were, 'over there'. We are fully inside them no" (Potts, 2025, p. 12)

- El problema de la IA es el desajuste entre la arquitectura de las instituciones y la ontología del objeto.
    
- Necesitamos nuevas lógicas institucionales para vivir con estos actores no-humanos.
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="#bf9aca" template="" -->

## Preguntas detonadoras 💥

1. Si la IA es un hiperobjeto y estamos dentro de ella, ¿quién tiene la legitimidad para gobernarla? ¿Qué tipo de tecnopolítica, en términos de objetivos políticos alcanzados por medios técnicos, puede sostener?    
2. Si la IA es resultado de la gran apropiación de lo público (la internet) y lo privado (acervo cultural, propiedad intelectual), ¿cómo se sostiene la legitimidad para gobernar "desde dentro" sin primero reconocer y reparar esa deuda de origen? ¿Qué efectos puede tener esto hacia el futuro?
3. ¿Qué colectivos están en desventaja para poder ejercer sus derechos y su autoridad en el contexto de los "agentic commons" propuestos?
4. Si la IA se sostiene tanto en capital especulativo como en capacidad técnica real, ¿estamos regulando una tecnología o estamos regulando una promesa basada en expectativas de un futuro posible?
5. Si la IA verdaderamente se consolida como un vínculo más directo, personal e íntimo, en el acceso y manejo de la información, ¿qué impacto es de esperar en la reproducción de los saberes y conocimientos (culturales, técnicos, prácticos)? ¿Qué implica para la memoria y la supervivencia de las culturas?

    <script>
        function extend() {
            const target = {};
            for (let i = 0; i < arguments.length; i++) {
                const source = arguments[i];
                for (const key in source) {
                    if (source.hasOwnProperty(key)) {
                        target[key] = source[key];
                    }
                }
            }
            return target;
        }

        function isLight(color) {
            let hex = color.replace('#', '');

            // convert #fff => #ffffff
            if (hex.length == 3) {
                hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
            }

            const c_r = parseInt(hex.substr(0, 2), 16);
            const c_g = parseInt(hex.substr(2, 2), 16);
            const c_b = parseInt(hex.substr(4, 2), 16);
            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }

        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();

        if (isLight(bgColor)) {
